<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>BookStore</title>
    </head>

    <body>
        <header><h1>Book</h1></header>

        <div>
            <div>
                <strong>{{.Title}}</strong>
                <span>#{{.ID}}</span>
            </div>
            <pre><code>Author: {{.Author}}</code></pre>
            <pre><code>Description: {{.Description}}</code></pre>
            <div>
                <time>Created: {{.CreatedAt}}</time>
            </div>
                <form action="/book/delete/{{.ID}}" method="DELETE">
                    <button>DELETE</button>
                </form>
            </div>

        <footer>
            Powered by <a href="https://golang.org">Go</a>
        </footer>
    </body>
</html>
