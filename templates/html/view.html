<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>BookStore</title>
    </head>

    <body>
        <header><h1>Book</h1></header>

        <div>
            <div>
                <strong>{{.Title}}</strong>
                <span>#{{.ID}}</span>
            </div>
            <pre><code>{{.Author}}</code></pre>
            <pre><code>{{.Description}}</code></pre>
            <div>
                <time>Created: {{.CreatedAt}}</time>
            </div>
            <button><a href="/form/update/:id">Edit</a></button>
        </div>

        <footer>
            Powered by <a href="https://golang.org">Go</a>
        </footer>
    </body>
</html>
